name: sscops

x-common-environment: &common-environment
  CLAUDE_CONFIG_DIR: /data/.claude
  CLAUDE_APP_ROOT: /app
  CLAUDE_CLI_PATH: /app/claude-sidecar
  CLAUDE_H5_DIST_DIR: /app/dist
  CALLER_DIR: /workspace
  NO_PROXY: led-gateway.lenovo.com,.lenovo.com,10.0.0.0/8,localhost,127.0.0.1,server

x-common-service: &common-service
  image: cc-hh-sscops:${SSCOPS_IMAGE_TAG:-local}
  restart: unless-stopped
  volumes:
    - ./state:/data/.claude
    - ${SSCOPS_WORKSPACE:-../..}:/workspace:ro

services:
  server:
    <<: *common-service
    build:
      context: ../..
      dockerfile: deploy/100server/Dockerfile
    env_file:
      - ${SSCOPS_MODEL_ENV_FILE:-./model.env}
    environment:
      <<: *common-environment
    command:
      - server
      - --app-root
      - /app
      - --host
      - 0.0.0.0
      - --port
      - "3456"
      - --cli-path
      - /app/claude-sidecar
    ports:
      - 127.0.0.1:${SSCOPS_SERVER_PORT:-3456}:3456
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:3456/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  feishu:
    <<: *common-service
    env_file:
      - ${SSCOPS_FEISHU_ENV_FILE:-./feishu.env}
    environment:
      <<: *common-environment
      ADAPTER_SERVER_URL: ws://server:3456
    command:
      - adapters
      - --app-root
      - /app
      - --feishu
    depends_on:
      server:
        condition: service_healthy
